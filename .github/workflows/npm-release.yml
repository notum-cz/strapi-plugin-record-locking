name: Publish to NPM

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build plugin
        run: yarn build

      - name: Verify plugin
        run: yarn verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: plugin-dist
          path: dist
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.release.prerelease == false)
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          persist-credentials: false

      - name: Download build artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: plugin-dist
          path: dist

      - name: Set up Node.js for publishing
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to NPM
        run: npm publish --provenance --access public --ignore-scripts
